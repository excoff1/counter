<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter || Rain.tech </title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="Frame 15.png" type="image/png">
</head>
<body>
    <center>
        <h1>Rain.Tech || Counter</h1>
    <div class="all">
        <div class="circle">
            <div class="counter">
                <h4 class="count">0</h4>
            </div>
        </div>
        <div class="buttons">
            <button class="plus">+</button>
            <button class="reset">Reset</button>
            <button class="minus">-</button>
        </div>
    </div>
    </center>
    <script src="index.js"></script>
</body>
</html>
